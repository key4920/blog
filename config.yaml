baseurl: https://key4920.github.io
languageCode: en-us
theme: stack
paginate: 5
title: 20's 블로그

# Change it to your Disqus shortname before using
disqusShortname: 내가 보려고 만든 기술 블로그

# GA Tracking ID
googleAnalytics: UA-189742603-1

# Theme i18n support
# Available values: en, fr, id, ja, ko, pt-br, zh-cn
DefaultContentLanguage: ko

permalinks:
    post: /p/:slug/
    page: /:slug/


params:
    mainSections:
        - post
    
    featuredImageField: image
    
    rssFullContent: true
    
    favicon : img/koala_favicon_test.png

    enableEmoji : true

    footer:
        since: 2021
        customText:

    #dateFormat:
        #published: "Feb 20, 2021" 
        #lastUpdated: "Feb 28, 2021"

    sidebar:
        emoji: 💜 
        subtitle: Stay Hungry, Stay Foolish
        avatar:
            local: true
            src: img/koala.png

    article:
        math: true
        license:
            enabled: true
            default: Licensed under key4920

    comments:
        enabled: false
        provider: disqus

        utterances:
            repo:
            issueTerm: pathname
            label:

        remark42:
            host:
            site:
            locale:

    widgets:
        enabled: 
            - search
            - archives
            - tag-cloud

        archives:
            limit: 5

        tagCloud:
            limit: 20

    opengraph:
        twitter:
            # Your Twitter username
            site: https://github.com/key4920

            # Available values: summary, summary_large_image
            card: summary_large_image

    defaultImage:
        opengraph:
            enabled: true
            local: false
            src:

    colorScheme:
        # Display toggle
        toggle: true

        # Available values: auto, light, dark
        default: auto

    imageProcessing:
        cover:
            enabled: true
        content:
            enabled: true

menu:
    main:
        - identifier: home
          name: Home
          url: /
          weight: -100
          pre: home

        - identifier: about
          name: About
          url: about
          weight: -90
          pre: user

        - identifier: archives
          name: Archives
          url: archives
          weight: -70
          pre: archives

        - identifier: bigdata-platform
          name: BigData Platform
          url: /categories/bigdata-platform/
          weight: -60
          pre: affiliate

        - identifier: search
          name: Search
          url: search
          weight: -50
          pre: search



related:
    includeNewer: true
    threshold: 60
    toLower: false
    indices:
        - name: tags
          weight: 100

        - name: categories
          weight: 120




markup:
    highlight:
        noClasses: false
